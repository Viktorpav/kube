---
- name: Create .kube directory
  file:
    path: "{{ item }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0750"
  with_items:
    - "{{ user_home }}/.kube"
    - "/root/.kube"

- name: Wait for admin.conf on first master
  wait_for:
    path: /etc/kubernetes/admin.conf
    state: present
    timeout: 300
  when: inventory_hostname == groups['k8s_masters'][0]

- name: Read admin.conf from first master
  slurp:
    src: /etc/kubernetes/admin.conf
  register: admin_conf_content
  when: inventory_hostname == groups['k8s_masters'][0]
  run_once: true

- name: Write admin.conf to additional masters
  copy:
    content: "{{ hostvars[groups['k8s_masters'][0]]['admin_conf_content']['content'] | b64decode }}"
    dest: /etc/kubernetes/admin.conf
    owner: root
    group: root
    mode: "0600"
  when: inventory_hostname != groups['k8s_masters'][0]

- name: Copy admin.conf to kubeconfig locations
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ item }}"
    remote_src: yes
    owner: "{{ 'ubuntu' if 'home' in item else 'root' }}"
    group: "{{ 'ubuntu' if 'home' in item else 'root' }}"
    mode: "0600"
  with_items:
    - "{{ user_home }}/.kube/config"
    - "/root/.kube/config"

- name: Check if additional masters are already joined
  shell: kubectl get nodes {{ inventory_hostname }} --no-headers 2>/dev/null || echo "not-found"
  register: node_check
  delegate_to: "{{ groups['k8s_masters'][0] }}"
  when: inventory_hostname != groups['k8s_masters'][0] and inventory_hostname in groups['k8s_masters']

- name: Generate certificate key for additional masters
  shell: kubeadm init phase upload-certs --upload-certs 2>/dev/null | tail -1
  register: certificate_key_output
  when: inventory_hostname == groups['k8s_masters'][0]
  run_once: true

- name: Generate join command for additional masters
  shell: kubeadm token create --print-join-command
  register: join_command_output
  when: inventory_hostname == groups['k8s_masters'][0]
  run_once: true

- name: Join additional master nodes to cluster
  shell: "{{ hostvars[groups['k8s_masters'][0]]['join_command_output']['stdout'] }} --control-plane --certificate-key {{ hostvars[groups['k8s_masters'][0]]['certificate_key_output']['stdout'] }}"
  register: join_result
  when:
    - inventory_hostname != groups['k8s_masters'][0]
    - inventory_hostname in groups['k8s_masters']
    - "'not-found' in node_check.stdout"

- name: Wait for kubelet to be ready on additional masters
  wait_for:
    port: 10250
    host: "{{ ansible_default_ipv4.address }}"
    timeout: 180
  when:
    - inventory_hostname != groups['k8s_masters'][0]
    - inventory_hostname in groups['k8s_masters']

- name: Wait for API server to be ready on additional masters
  wait_for:
    port: 6443
    host: "{{ ansible_default_ipv4.address }}"
    timeout: 300
  when:
    - inventory_hostname != groups['k8s_masters'][0]
    - inventory_hostname in groups['k8s_masters']

- name: Verify additional masters joined successfully
  shell: kubectl get nodes {{ inventory_hostname }} --no-headers
  register: final_node_check
  delegate_to: "{{ groups['k8s_masters'][0] }}"
  until: final_node_check.rc == 0
  retries: 5
  delay: 10
  when:
    - inventory_hostname != groups['k8s_masters'][0]
    - inventory_hostname in groups['k8s_masters']

# Optional: Add a small delay before checking all masters
- name: Brief pause before checking all masters
  pause:
    seconds: 10
  when: inventory_hostname == groups['k8s_masters'][0]

- name: Wait for all masters to be ready
  wait_for:
    host: "{{ ansible_default_ipv4.address }}"
    port: 6443
    timeout: 180
