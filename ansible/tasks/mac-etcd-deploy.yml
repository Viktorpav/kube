---
- name: Ensure etcd directory exists on mac-etcd
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "~/k8s-etcd"
    - "~/k8s-etcd/certs"
    - "~/k8s-etcd/data"

- name: Deploy certificates to mac-etcd
  ansible.builtin.copy:
    src: "/tmp/k8s-etcd-certs/{{ item }}"
    dest: "~/k8s-etcd/certs/{{ item }}"
    mode: "0644"
    backup: yes
  loop:
    - ca.crt
    - mac-etcd.crt
    - mac-etcd.key
    - mac-etcd-peer.crt
    - mac-etcd-peer.key

- name: Deploy docker-compose on mac-etcd
  ansible.builtin.template:
    src: files/kubernetes/etcd-docker-compose.yml.j2
    dest: "~/k8s-etcd/docker-compose.yml"
    mode: "0644"
    backup: yes

- name: Check if Docker Compose is available
  ansible.builtin.command:
    cmd: which docker-compose
  register: docker_compose_check
  failed_when: false
  changed_when: false

- name: Stop existing etcd container if running
  ansible.builtin.command:
    cmd: "{{ 'docker-compose' if docker_compose_check.rc == 0 else 'docker compose' }} down"
    chdir: "~/k8s-etcd"
  failed_when: false
  changed_when: false

- name: Start etcd container on mac-etcd
  ansible.builtin.command:
    cmd: "{{ 'docker-compose' if docker_compose_check.rc == 0 else 'docker compose' }} up -d"
    chdir: "~/k8s-etcd"
  register: docker_compose_result
  changed_when: "'Started' in docker_compose_result.stdout or 'Created' in docker_compose_result.stdout"

- name: Wait for etcd to be ready
  ansible.builtin.wait_for:
    port: 2379
    host: "{{ ansible_default_ipv4.address | default('127.0.0.1') }}"
    delay: 10
    timeout: 120

- name: Verify etcd health
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address | default('127.0.0.1') }}:2379/health"
    method: GET
    validate_certs: false
    client_cert: "~/k8s-etcd/certs/mac-etcd.crt"
    client_key: "~/k8s-etcd/certs/mac-etcd.key"
  register: etcd_health
  retries: 5
  delay: 5
  until: etcd_health.status == 200

- name: Clean up temporary certificate files
  ansible.builtin.file:
    path: "/tmp/k8s-etcd-certs"
    state: absent
  delegate_to: localhost
  run_once: true
