---
- name: Determine if cluster state is 'new' or 'existing'
  ansible.builtin.set_fact:
    etcd_cluster_state: "{{ 'new' if etcd_primary_node == inventory_hostname else 'existing' }}"

- name: Create etcd directories on all nodes
  ansible.builtin.file:
    path: /etc/kubernetes/pki/etcd
    state: directory
    mode: "0755"
  when: "'k8s_masters' in group_names"

- name: Create etcd directories on mac-etcd
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/k8s-etcd/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - data
    - certs
    - config
  when: inventory_hostname == 'mac-etcd'

- name: Copy etcd certificates and keys to nodes
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/temp_pki_etcd/{{ item.file }}"
    dest: "{{ '/etc/kubernetes/pki/etcd/' if 'k8s_masters' in group_names else ansible_env.HOME + '/k8s-etcd/certs/' }}{{ item.file }}"
    mode: "{{ item.mode }}"
  loop:
    - { file: "ca.crt", mode: "0644" }
    - { file: "{{ inventory_hostname }}.crt", mode: "0644" }
    - { file: "{{ inventory_hostname }}.key", mode: "0600" }
    - { file: "{{ inventory_hostname }}-peer.crt", mode: "0644" } # ADD THIS
    - { file: "{{ inventory_hostname }}-peer.key", mode: "0600" } # ADD THIS
    - { file: "apiserver-etcd-client.crt", mode: "0644" }
    - { file: "apiserver-etcd-client.key", mode: "0600" }
  when: "'k8s_masters' in group_names or inventory_hostname in groups['etcd_nodes']"

- name: Deploy etcd docker-compose.yml template
  ansible.builtin.template:
    src: etcd-docker-compose.yml.j2
    dest: "{{ ansible_env.HOME }}/k8s-etcd/docker-compose.yml"
    mode: "0644"
  when: inventory_hostname == 'mac-etcd'

- name: Run etcd container
  ansible.builtin.command: docker-compose up -d
  args:
    chdir: "{{ ansible_env.HOME }}/k8s-etcd"
  when: inventory_hostname == 'mac-etcd'
