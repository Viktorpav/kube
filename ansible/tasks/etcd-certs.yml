---
- name: Generate etcd CA key
  community.crypto.openssl_privatekey:
    path: "{{ etcd_pki_dir }}/ca.key"
    mode: "0600"
  run_once: true

- name: Generate etcd CA CSR with CA extensions
  community.crypto.openssl_csr:
    path: "{{ etcd_pki_dir }}/ca.csr"
    privatekey_path: "{{ etcd_pki_dir }}/ca.key"
    common_name: "etcd-ca"
    basic_constraints:
      - "CA:TRUE"
    basic_constraints_critical: true
    key_usage:
      - keyCertSign
      - cRLSign
    key_usage_critical: true
  run_once: true

- name: Generate etcd CA certificate
  community.crypto.x509_certificate:
    path: "{{ etcd_pki_dir }}/ca.crt"
    privatekey_path: "{{ etcd_pki_dir }}/ca.key"
    csr_path: "{{ etcd_pki_dir }}/ca.csr"
    provider: selfsigned
    mode: "0644"
  run_once: true

- name: Generate private key for etcd node {{ item }}
  community.crypto.openssl_privatekey:
    path: "{{ etcd_pki_dir }}/{{ item }}.key"
    mode: "0600"
  loop: "{{ groups['etcd_nodes'] }}"
  loop_control:
    label: "{{ item }}"
  run_once: true

- name: Generate CSR for etcd server {{ item }}
  community.crypto.openssl_csr:
    path: "{{ etcd_pki_dir }}/{{ item }}.csr"
    privatekey_path: "{{ etcd_pki_dir }}/{{ item }}.key"
    common_name: "{{ item }}"
    subject_alt_name:
      - "IP:{{ hostvars[item].ansible_host }}"
      - "IP:127.0.0.1"
      - "DNS:{{ item }}"
      - "DNS:localhost"
    extended_key_usage:
      - serverAuth
      - clientAuth
    key_usage:
      - digitalSignature
      - keyEncipherment
  loop: "{{ groups['etcd_nodes'] }}"
  loop_control:
    label: "{{ item }}"
  run_once: true

- name: Generate signed certificate for etcd node {{ item }}
  community.crypto.x509_certificate:
    path: "{{ etcd_pki_dir }}/{{ item }}.crt"
    privatekey_path: "{{ etcd_pki_dir }}/{{ item }}.key"
    csr_path: "{{ etcd_pki_dir }}/{{ item }}.csr"
    ownca_path: "{{ etcd_pki_dir }}/ca.crt"
    ownca_privatekey_path: "{{ etcd_pki_dir }}/ca.key"
    provider: ownca
    mode: "0644"
  loop: "{{ groups['etcd_nodes'] }}"
  loop_control:
    label: "{{ item }}"
  run_once: true

- name: Generate private key for etcd peer {{ item }}
  community.crypto.openssl_privatekey:
    path: "{{ etcd_pki_dir }}/{{ item }}-peer.key"
    mode: "0600"
  loop: "{{ groups['etcd_nodes'] }}"
  loop_control:
    label: "{{ item }}"
  run_once: true

- name: Generate CSR for etcd peer {{ item }}
  community.crypto.openssl_csr:
    path: "{{ etcd_pki_dir }}/{{ item }}-peer.csr"
    privatekey_path: "{{ etcd_pki_dir }}/{{ item }}-peer.key"
    common_name: "{{ item }}"
    subject_alt_name:
      - "IP:{{ hostvars[item].ansible_host }}"
      - "IP:127.0.0.1"
      - "DNS:{{ item }}"
      - "DNS:localhost"
    extended_key_usage:
      - serverAuth
      - clientAuth
    key_usage:
      - digitalSignature
      - keyEncipherment
  loop: "{{ groups['etcd_nodes'] }}"
  loop_control:
    label: "{{ item }}"
  run_once: true

- name: Generate signed peer certificate for etcd node {{ item }}
  community.crypto.x509_certificate:
    path: "{{ etcd_pki_dir }}/{{ item }}-peer.crt"
    privatekey_path: "{{ etcd_pki_dir }}/{{ item }}-peer.key"
    csr_path: "{{ etcd_pki_dir }}/{{ item }}-peer.csr"
    ownca_path: "{{ etcd_pki_dir }}/ca.crt"
    ownca_privatekey_path: "{{ etcd_pki_dir }}/ca.key"
    provider: ownca
    mode: "0644"
  loop: "{{ groups['etcd_nodes'] }}"
  loop_control:
    label: "{{ item }}"
  run_once: true

- name: Generate kube-apiserver client key
  community.crypto.openssl_privatekey:
    path: "{{ etcd_pki_dir }}/apiserver-etcd-client.key"
    mode: "0600"
  run_once: true

- name: Generate kube-apiserver client CSR
  community.crypto.openssl_csr:
    path: "{{ etcd_pki_dir }}/apiserver-etcd-client.csr"
    privatekey_path: "{{ etcd_pki_dir }}/apiserver-etcd-client.key"
    common_name: "apiserver-etcd-client"
    extended_key_usage:
      - clientAuth
    key_usage:
      - digitalSignature
      - keyEncipherment
  run_once: true

- name: Generate kube-apiserver client certificate
  community.crypto.x509_certificate:
    path: "{{ etcd_pki_dir }}/apiserver-etcd-client.crt"
    privatekey_path: "{{ etcd_pki_dir }}/apiserver-etcd-client.key"
    csr_path: "{{ etcd_pki_dir }}/apiserver-etcd-client.csr"
    ownca_path: "{{ etcd_pki_dir }}/ca.crt"
    ownca_privatekey_path: "{{ etcd_pki_dir }}/ca.key"
    provider: ownca
    mode: "0644"
  run_once: true
