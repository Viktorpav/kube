---
# ===================================================================
# Block for Kubernetes Masters (using containerd and static pods)
# ===================================================================
- name: Deploy etcd as a static pod on Kubernetes masters
  block:
    - name: Ensure etcd data directory exists on masters
      ansible.builtin.file:
        path: /var/lib/etcd
        state: directory
        mode: "0755"

    - name: Ensure etcd PKI directory exists on masters
      ansible.builtin.file:
        path: /etc/kubernetes/pki/etcd
        state: directory
        mode: "0755"

    - name: Distribute etcd certificates to masters
      ansible.builtin.copy:
        src: "/tmp/k8s-etcd-certs/{{ item }}"
        dest: "/etc/kubernetes/pki/etcd/{{ item }}"
        mode: "0600"
      loop:
        - ca.crt
        - "{{ inventory_hostname }}.crt"
        - "{{ inventory_hostname }}.key"
        - "{{ inventory_hostname }}-peer.crt"
        - "{{ inventory_hostname }}-peer.key"

    - name: Ensure Kubernetes manifest directory exists on masters
      ansible.builtin.file:
        path: /etc/kubernetes/manifests
        state: directory
        mode: "0755"

    - name: Deploy etcd static pod manifest to masters
      ansible.builtin.template:
        src: files/kubernetes/etcd-static-pod.yaml.j2
        dest: /etc/kubernetes/manifests/etcd.yaml
        mode: "0644"
  when: "'k8s_masters' in group_names"
  become: true

# ===================================================================
# Block for macOS node (using Docker Compose)
# ===================================================================
- name: Deploy etcd with Docker Compose on macOS
  block:
    - name: Set macOS specific facts
      ansible.builtin.set_fact:
        etcd_mac_dir: "{{ ansible_env.HOME }}/k8s-etcd"

    - name: Ensure etcd directories exist on macOS
      ansible.builtin.file:
        path: "{{ etcd_mac_dir }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - certs
        - data

    - name: Distribute etcd certificates to macOS
      ansible.builtin.copy:
        src: "/tmp/k8s-etcd-certs/{{ item }}"
        dest: "{{ etcd_mac_dir }}/certs/{{ item }}"
        mode: "0644"
      loop:
        - ca.crt
        - "{{ inventory_hostname }}.crt"
        - "{{ inventory_hostname }}.key"
        - "{{ inventory_hostname }}-peer.crt"
        - "{{ inventory_hostname }}-peer.key"
      notify: restart etcd on mac

    - name: Deploy etcd docker-compose template to macOS
      ansible.builtin.template:
        src: files/kubernetes/etcd-docker-compose.yaml.j2
        dest: "{{ etcd_mac_dir }}/docker-compose.yml"
        mode: "0644"
      notify: restart etcd on mac

    - name: Start etcd container on macOS
      ansible.builtin.command:
        cmd: "docker compose up -d --remove-orphans"
        chdir: "{{ etcd_mac_dir }}"
      changed_when: false
  when: "'k8s_masters' not in group_names"
  become: false
