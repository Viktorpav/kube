---
- name: Copy kubeadm config to the first master
  ansible.builtin.template:
    src: files/kubernetes/kubeadm-config.yaml.j2
    dest: /tmp/kubeadm-config.yaml
    mode: "0644"

- name: Ensure etcd PKI directory exists on the master
  ansible.builtin.file:
    path: /etc/kubernetes/pki/etcd
    state: directory
    mode: "0755"

- name: Copy etcd CA and client certs for API Server
  ansible.builtin.copy:
    src: "/tmp/k8s-etcd-certs/{{ item }}"
    dest: "/etc/kubernetes/pki/etcd/{{ item }}"
    mode: "0644"
  loop:
    - ca.crt
    - apiserver-etcd-client.crt
    - apiserver-etcd-client.key

- name: Check if Kubernetes is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_initialized

- name: Initialize Kubernetes cluster
  ansible.builtin.command: kubeadm init --config=/tmp/kubeadm-config.yaml --upload-certs
  register: kubeadm_init
  changed_when: true
  when: not k8s_initialized.stat.exists
